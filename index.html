<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kronika Česká &amp; Moravská</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English+SC&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'IM Fell English', serif;
      background: #1a1410;
      color: #d4c5a0;
      height: 100vh;
      overflow: hidden;
    }

    .page {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* MAPA — 75 % */
    .map-section {
      height: 75vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 20% 50%, rgba(60,40,20,0.3) 0%, transparent 60%);
      padding: 1rem;
    }

    .map-section img {
      max-width: 100%;
      max-height: 100%;
      border: 3px solid #5a4a30;
      border-radius: 4px;
      box-shadow: 0 0 40px rgba(0,0,0,0.7);
      object-fit: contain;
    }

    /* SPODNÍ PANEL — 25 %, 50/50 */
    .info-panel {
      height: 25vh;
      display: flex;
      border-top: 1px solid #3a2a1a;
      background: linear-gradient(0deg, #0d0a07 0%, transparent 100%);
    }

    .player-card {
      flex: 0 0 50%;
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.5rem 1.5rem;
    }

    .player-card:first-child {
      border-right: 1px solid #2a1f10;
    }

    .player-card .portrait {
      flex: 0 0 30%;
      max-width: 30%;
      height: 85%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .player-card .portrait img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border: 2px solid #5a4a30;
      border-radius: 3px;
    }

    .player-card .portrait .placeholder {
      width: 100%;
      height: 85%;
      background: linear-gradient(135deg, #2a1f10, #1a1410);
      border: 2px solid #5a4a30;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #5a4a30;
      font-style: italic;
      font-size: 0.8rem;
      text-align: center;
      padding: 0.3rem;
    }

    .player-card .text {
      flex: 0 0 65%;
    }

    .player-card .name {
      font-family: 'IM Fell English SC', serif;
      font-size: 1.2rem;
      color: #e0c978;
      margin-bottom: 0.2rem;
    }

    .player-card .title {
      font-size: 0.75rem;
      color: #8b7355;
      font-style: italic;
      margin-bottom: 0.5rem;
    }

    .player-card ul {
      list-style: none;
      padding: 0;
    }

    .player-card ul li {
      position: relative;
      padding: 0.25rem 0 0.25rem 1.2rem;
      font-size: 0.8rem;
      line-height: 1.3;
      color: #c4b590;
    }

    .player-card ul li::before {
      content: '❦';
      position: absolute;
      left: 0;
      top: 0.2rem;
      color: #8b7355;
      font-size: 0.6rem;
    }

    .player-card ul li .hl {
      color: #e0c978;
    }

    @media (max-width: 800px) {
      .info-panel { flex-direction: column; height: 40vh; }
      .map-section { height: 60vh; }
      .player-card { flex: 0 0 50%; padding: 0.3rem 0.8rem; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="map-section">
      <img src="map-1.png" alt="Mapa">
    </div>
    <div class="info-panel">
      <div class="player-card">
        <div class="portrait">
          <img src="knoty-1.png" alt="Knoty">
        </div>
        <div class="text">
          <div class="name">Knoty</div>
          <div class="title">Vévoda Český</div>
          <ul>
            <li>Převzal <span class="hl">kontrolu nad českým knížectvím</span></li>
          </ul>
        </div>
      </div>
      <div class="player-card">
        <div class="portrait">
          <img src="matej-1.png" alt="Matej">
        </div>
        <div class="text">
          <div class="name">Matej</div>
          <div class="title">Náčelník kmene Krakow</div>
          <ul>
            <li>Ujal se <span class="hl">kmene krakovského</span></li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
