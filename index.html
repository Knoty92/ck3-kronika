<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kronika Česká &amp; Moravská</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English+SC&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'IM Fell English', serif;
      background: #1a1410;
      color: #d4c5a0;
      height: 100vh;
      overflow: hidden;
    }

    .page {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* MAP — 75 % výšky */
    .map-section {
      height: 75vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(60,40,20,0.3) 0%, transparent 60%);
      padding: 1rem;
    }

    .map-section img {
      max-width: 100%;
      max-height: 100%;
      border: 3px solid #5a4a30;
      border-radius: 4px;
      box-shadow: 0 0 40px rgba(0,0,0,0.7);
      object-fit: contain;
    }

    /* SPODNÍ PANEL — 25 % výšky */
    .info-panel {
      height: 25vh;
      display: flex;
      align-items: center;
      gap: 2rem;
      padding: 0 3rem;
      background: linear-gradient(0deg, #0d0a07 0%, transparent 100%);
      border-top: 1px solid #3a2a1a;
    }

    .character {
      flex: 0 0 20%;
      max-width: 20%;
      height: 90%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .character img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border: 2px solid #5a4a30;
      border-radius: 3px;
    }

    .character .placeholder {
      width: 100%;
      height: 90%;
      background: linear-gradient(135deg, #2a1f10, #1a1410);
      border: 2px solid #5a4a30;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #5a4a30;
      font-style: italic;
      font-size: 0.9rem;
      text-align: center;
      padding: 0.5rem;
    }

    .events {
      flex: 0 0 75%;
      max-width: 75%;
      padding: 0.5rem 0;
    }

    .player-name {
      font-family: 'IM Fell English SC', serif;
      font-size: 1.5rem;
      color: #e0c978;
      margin-bottom: 0.5rem;
    }

    .player-title {
      font-size: 0.85rem;
      color: #8b7355;
      font-style: italic;
      margin-bottom: 0.75rem;
    }

    .event-list {
      list-style: none;
      padding: 0;
    }

    .event-list li {
      position: relative;
      padding: 0.35rem 0 0.35rem 1.5rem;
      font-size: 0.95rem;
      line-height: 1.4;
      color: #c4b590;
    }

    .event-list li::before {
      content: '❦';
      position: absolute;
      left: 0;
      top: 0.3rem;
      color: #8b7355;
      font-size: 0.7rem;
    }

    .event-list li .date {
      font-size: 0.7rem;
      color: #5a4a30;
      letter-spacing: 1px;
      margin-right: 0.3rem;
      font-style: italic;
    }

    .event-list li .hl {
      color: #e0c978;
    }

    @media (max-width: 800px) {
      .info-panel {
        flex-direction: column;
        padding: 0 1rem;
        gap: 0.5rem;
      }
      .character {
        flex: 0 0 auto;
        max-width: 30%;
        height: 40%;
      }
      .events {
        flex: 0 0 auto;
        max-width: 100%;
      }
      .player-name { font-size: 1.1rem; }
      .event-list li { font-size: 0.8rem; }
    }

    @media (max-width: 500px) {
      .map-section { height: 60vh; }
      .info-panel { height: 40vh; }
      .character { max-width: 25%; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="map-section">
      <img src="map.png" alt="Mapa">
    </div>
    <div class="info-panel">
      <div class="character">
        <img src="knoty.png" alt="Knoty">
      </div>
      <div class="events">
        <div class="player-name">Knoty</div>
        <div class="player-title">Vévoda Český</div>
        <ul class="event-list">
          <li><span class="date">LÉTA PÁNĚ 1066</span>Vévoda Knoty <span class="hl">převzal kontrolu nad českým knížectvím</span></li>
        </ul>
      </div>
    </div>
  </div>
</body>
</html>
